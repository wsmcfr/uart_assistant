name: Release Build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgDir = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
          & "$vcpkgDir\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$vcpkgDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          arch: "win64_msvc2022_64"
          modules: "qtserialport"

      - name: Configure
        shell: pwsh
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DVCPKG_FEATURE_FLAGS=manifests

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target ComAssistant --parallel

      - name: Deploy Qt Runtime
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "build\Release\ComAssistant.exe"
          if (-not (Test-Path $exePath)) { throw "ComAssistant.exe not found: $exePath" }
          & windeployqt --release --no-translations $exePath

      - name: Prepare Portable Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $packageRoot = Join-Path $PWD "artifacts\ComAssistant_Portable"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          Copy-Item -Path "build\Release\*" -Destination $packageRoot -Recurse -Force
          if (Test-Path "build\*.qm") {
            $translationsDir = Join-Path $packageRoot "translations"
            New-Item -ItemType Directory -Force -Path $translationsDir | Out-Null
            Copy-Item -Path "build\*.qm" -Destination $translationsDir -Force
          }
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" $packageRoot -Force }
          if (Test-Path "README.md") { Copy-Item "README.md" $packageRoot -Force }

          $zipName = "ComAssistant_${tag}_Windows_x64_Portable.zip"
          $zipPath = Join-Path $PWD "artifacts\$zipName"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$packageRoot\*" -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path (Join-Path $PWD "artifacts\SHA256SUMS.txt") -Value "$hash  $zipName"

      - name: Generate Release Notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $repo = "${{ github.repository }}"
          $changelogPath = Join-Path $PWD "CHANGELOG.md"
          $notesPath = Join-Path $PWD "artifacts\RELEASE_NOTES.md"

          if (-not (Test-Path $changelogPath)) {
            throw "CHANGELOG.md not found: $changelogPath"
          }

          $lines = Get-Content -Path $changelogPath -Encoding UTF8
          $start = -1
          for ($i = 0; $i -lt $lines.Length; $i++) {
            if ($lines[$i] -match "^## \[$([regex]::Escape($version))\]\s*-") {
              $start = $i
              break
            }
          }

          $section = ""
          if ($start -ge 0) {
            $end = $lines.Length
            for ($j = $start + 1; $j -lt $lines.Length; $j++) {
              if ($lines[$j] -match "^## \[") {
                $end = $j
                break
              }
            }
            if ($end -gt ($start + 1)) {
              $section = ($lines[($start + 1)..($end - 1)] -join "`n").Trim()
            }
          }

          if ([string]::IsNullOrWhiteSpace($section)) {
            $section = "- 本版本详细说明暂未同步到 CHANGELOG。`n- 维护者可在 CHANGELOG.md 增加对应的版本段落后重新发布。"
          }

          $bodyLines = @(
            "# ComAssistant $tag"
            ""
            "## 下载"
            "- Windows x64 便携版：ComAssistant_${tag}_Windows_x64_Portable.zip"
            "- 完整性校验：SHA256SUMS.txt"
            ""
            "## 本版本更新"
            $section
            ""
            "## 反馈"
            "- 问题反馈与建议：https://github.com/$repo/issues"
          )
          $body = $bodyLines -join "`n"

          Set-Content -Path $notesPath -Value $body -Encoding UTF8

      - name: Upload GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/RELEASE_NOTES.md
          files: |
            artifacts/*.zip
            artifacts/SHA256SUMS.txt

      - name: Update Latest Release Info (README + Help)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseDate = (Get-Date).ToString("yyyy-MM-dd")
          $zipName = "ComAssistant_${tag}_Windows_x64_Portable.zip"

          git fetch origin main
          git checkout -B main origin/main

          $docsUpdated = $false

          $readmePath = Join-Path $PWD "README.md"
          if (-not (Test-Path $readmePath)) {
            throw "README.md not found: $readmePath"
          }

          $content = Get-Content -Path $readmePath -Raw -Encoding UTF8
          $markerPattern = '(?s)<!-- LATEST_RELEASE:START -->.*?<!-- LATEST_RELEASE:END -->'

          $blockLines = @(
            "<!-- LATEST_RELEASE:START -->"
            "- 当前最新稳定版：$tag（发布于 $releaseDate）"
            "- 直链下载：<https://github.com/$repo/releases/download/$tag/$zipName>"
            "- 校验文件：<https://github.com/$repo/releases/download/$tag/SHA256SUMS.txt>"
            "<!-- LATEST_RELEASE:END -->"
          )
          $newBlock = $blockLines -join "`n"

          if (-not ($content -match $markerPattern)) {
            throw "README.md does not contain LATEST_RELEASE marker block."
          }

          $updated = [regex]::Replace(
            $content,
            $markerPattern,
            [System.Text.RegularExpressions.MatchEvaluator]{
              param($m)
              $newBlock
            }
          )

          if ($updated -ne $content) {
            Set-Content -Path $readmePath -Value $updated -Encoding UTF8
            $docsUpdated = $true
          }

          $helpPath = Join-Path $PWD "resources/help/quickstart.html"
          if (-not (Test-Path $helpPath)) {
            throw "quickstart.html not found: $helpPath"
          }

          $helpContent = Get-Content -Path $helpPath -Raw -Encoding UTF8
          $helpMarkerPattern = '(?s)<!-- LATEST_RELEASE_HELP:START -->.*?<!-- LATEST_RELEASE_HELP:END -->'
          $helpBlockLines = @(
            "<!-- LATEST_RELEASE_HELP:START -->"
            "<p><strong>当前版本：</strong>$tag（发布于 $releaseDate）<br>"
            "<strong>Current:</strong> $tag (released on $releaseDate)</p>"
            "<p><strong>直链下载：</strong><a href='https://github.com/$repo/releases/download/$tag/$zipName'>$zipName</a><br>"
            "<strong>校验文件：</strong><a href='https://github.com/$repo/releases/download/$tag/SHA256SUMS.txt'>SHA256SUMS.txt</a></p>"
            "<!-- LATEST_RELEASE_HELP:END -->"
          )
          $newHelpBlock = $helpBlockLines -join "`n"

          if (-not ($helpContent -match $helpMarkerPattern)) {
            throw "quickstart.html does not contain LATEST_RELEASE_HELP marker block."
          }

          $updatedHelp = [regex]::Replace(
            $helpContent,
            $helpMarkerPattern,
            [System.Text.RegularExpressions.MatchEvaluator]{
              param($m)
              $newHelpBlock
            }
          )

          if ($updatedHelp -ne $helpContent) {
            Set-Content -Path $helpPath -Value $updatedHelp -Encoding UTF8
            $docsUpdated = $true
          }

          if ($docsUpdated) {
            "DOCS_UPDATED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "DOCS_UPDATED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Commit README Latest Release Info
        if: env.DOCS_UPDATED == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md resources/help/quickstart.html
          git commit -m "docs(release): 更新最新发布信息为 ${{ github.ref_name }}"
          git push origin main
